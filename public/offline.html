<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1e63a8" />
        <title>Offline</title>
        <style>
            :root {
                color-scheme: light dark;
            }

            body {
                margin: 0;
                font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
                    sans-serif;
                background: #0b1220;
                color: #e5e7eb;
            }

            .wrap {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
            }

            .card {
                width: 100%;
                max-width: 520px;
                border-radius: 16px;
                padding: 24px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 16px;
            }

            .brand img {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                object-fit: contain;
                background: rgba(255, 255, 255, 0.1);
            }

            h1 {
                font-size: 20px;
                margin: 0;
            }

            p {
                margin: 10px 0 0;
                font-size: 14px;
                color: rgba(229, 231, 235, 0.85);
                line-height: 1.5;
            }

            .actions {
                margin-top: 18px;
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }

            button {
                appearance: none;
                border: 0;
                border-radius: 12px;
                padding: 10px 14px;
                font-weight: 600;
                cursor: pointer;
                background: #1e63a8;
                color: #ffffff;
            }

            button.secondary {
                background: rgba(255, 255, 255, 0.14);
                color: #e5e7eb;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="card">
                <div class="brand">
                    <img src="/biru@4x.png" alt="BITTER" />
                    <div>
                        <h1>Kamu sedang offline</h1>
                        <p>
                            Periksa koneksi internet kamu, lalu coba muat ulang.
                        </p>
                    </div>
                </div>

                <div class="actions">
                    <button onclick="location.reload()">Coba lagi</button>
                    <button class="secondary" onclick="history.back()">
                        Kembali
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
